services:
  coordination-proof:
    ports:
      - "127.0.0.1:3300:3000"

  postgres-proof-two:
    image: postgres:17
    environment:
      POSTGRES_DB: coordination_server_proof_two
      POSTGRES_PASSWORD: proof-only
      POSTGRES_USER: proof
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proof -d coordination_server_proof_two"]
      interval: 2s
      timeout: 5s
      retries: 20
    volumes:
      - postgres-proof-two-data:/var/lib/postgresql/data

  coordination-proof-two:
    build:
      context: .
      dockerfile: apps/coordination-server/Dockerfile.proof
    command:
      - bash
      - -c
      - >-
        bin/rails db:prepare &&
        exec bin/rails server --binding 0.0.0.0 --port 3000
    depends_on:
      postgres-proof-two:
        condition: service_healthy
    environment:
      AWSM_CABLE_ADAPTER: async
      AWSM_JOB_QUEUE_ADAPTER: async
      AWSM_OPENAPI_PATH: /docs/specifications/protocol/http-api.openapi.yaml
      AWSM_OPAQUE_STORAGE_PATH: /opaque-storage-two
      AWSM_SYNTHETIC_ACCOUNT_SECRET: awsm-proof-two-synthetic-account-parameter-secret
      AWSM_SYNC_PROOF: "true"
      RAILS_ENV: test
      TEST_DATABASE_URL: postgresql://proof:proof-only@postgres-proof-two:5432/coordination_server_proof_two
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:3000/ready"]
      interval: 2s
      timeout: 5s
      retries: 30
    ports:
      - "127.0.0.1:3301:3000"
    volumes:
      - opaque-proof-two-data:/opaque-storage-two

volumes:
  postgres-proof-two-data:
  opaque-proof-two-data:
