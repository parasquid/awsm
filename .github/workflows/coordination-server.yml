name: Coordination Server

on:
  pull_request:
  push:
    branches: [main]

jobs:
  rails:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: coordination_server_test
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        options: >-
          --health-cmd "pg_isready -U postgres -d coordination_server_test"
          --health-interval 2s --health-timeout 5s --health-retries 20
        ports:
          - 5432:5432
    defaults:
      run:
        working-directory: apps/coordination-server
    env:
      RAILS_ENV: test
      TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/coordination_server_test
      AWSM_SYNTHETIC_ACCOUNT_SECRET: test-only-synthetic-account-secret
      AWSM_OPENAPI_PATH: ${{ github.workspace }}/docs/specifications/protocol/http-api.openapi.yaml
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.4.4
      - run: bundle install
      - run: bin/rails db:prepare
      - run: bin/ci

  sync-proof:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: docker compose -f compose.sync-proof.yml up --build --abort-on-container-exit --exit-code-from replica-proof
      - if: always()
        run: docker compose -f compose.sync-proof.yml down --volumes --remove-orphans

  production-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: docker build -f apps/coordination-server/Dockerfile -t awsm-coordination-server .
      - run: docker run --rm --entrypoint test awsm-coordination-server -r /docs/specifications/protocol/http-api.openapi.yaml
